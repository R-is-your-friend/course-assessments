project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!/solution/"

website:
  page-navigation: true
  title: "R is Your Friend"
  description: "Index of Course Materials"
  site-url: "https://R-is-your-friend.github.io/course-assessments"
  repo-url: https://github.com/R-is-your-friend/course-assessments
  repo-actions: [issue]

  page-footer:
    right: "This page is built with ❤️️ and [Quarto](https://quarto.org/)."
    left: "Built by Kelly Bodwin, Charlotte Mann,  Zoe Rehnberg, Emily Robinson, Julia Schedler, and Allison Theobold."
    background: "#bfd3e6"

