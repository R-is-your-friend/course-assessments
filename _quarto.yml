format:
  html:
    code-link: true
    theme:
      light: [cosmo, style/customcallouts.scss, style/risfriend.scss]
      dark: [cosmo, style/customcallouts.scss, style/risfriend.scss]
    code-copy: true
    mainfont: "Atkinson Hyperlegible"
    code-overflow: wrap
    toc: true
    linkcolor: "#8856a7"
    code-annotations: below
    toc-depth: 4
  # pdf:
  #   documentclass: scrreprt

filters:
  - style/custom_callout.lua
  
editor: source

execute: 
  echo: true
  warning: false
  error: true
  freeze: auto
